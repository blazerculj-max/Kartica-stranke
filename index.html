  .tab.active { color: var(--text); border-bottom-color: var(--blue); font-weight: 500; }
  .tab .badge { display: inline-flex; align-items: center; justify-content: center; background: var(--blue); color: #fff; border-radius: 10px; font-size: 11px; padding: 1px 6px; margin-left: 5px; }

  .results-table th { font-size: 12px; color: var(--text-secondary); font-weight: 400; text-align: left; padding: 8px 12px; background: var(--bg-secondary); border-bottom: 0.5px solid var(--border); }
  .results-table td { padding: 11px 12px; font-size: 13px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
  .results-table tr:last-child td { border-bottom: none; }
  .client-link { color: var(--blue); font-weight: 500; cursor: pointer; text-decoration: none; }

  .avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--bg-secondary); border: 0.5px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 15px; }

function calcAge(dob) {
  const [d, m, y] = dob.split('.').map(Number);
  const today = new Date();
  let age = today.getFullYear() - y;
  if (today.getMonth() + 1 < m || (today.getMonth() + 1 === m && today.getDate() < d)) age--;
  return age;
}

function doSearch() { state.submitted = state.query.trim(); render(); }

function render() {
  const overlay = document.getElementById('adm-overlay');
  if (overlay && !admin.showLogin) overlay.remove();
  const root = document.getElementById('root');
  if (state.view === 'admin') { root.innerHTML = renderAdminPanel(); attachAdminEvents(); return; }
  root.innerHTML = state.view === 'search' ? renderSearch() : renderClient();
  attachEvents();
  if (admin.showLogin) { document.body.insertAdjacentHTML('beforeend', renderAdminLoginModal()); attachAdminLoginEvents(); }
}

function attachEvents() {
  const inp = document.getElementById('search');
  if (inp) {
    inp.addEventListener('input', e => state.query = e.target.value);
    inp.addEventListener('keydown', e => e.key === 'Enter' && doSearch());
    inp.focus();
    inp.setSelectionRange(inp.value.length, inp.value.length);
  }
  const btn = document.getElementById('searchBtn');
  if (btn) btn.addEventListener('click', doSearch);
  document.getElementById('adminAccessBtn')?.addEventListener('click', () => {
    if (admin.loggedIn) { state.view = 'admin'; render(); }
    else { admin.showLogin = true; render(); }
  });
  document.querySelectorAll('.client-link').forEach(a => a.addEventListener('click', e => {
    e.preventDefault();
    state.client = CLIENTS.find(c => c.id === parseInt(a.dataset.id));
    state.view = 'client'; state.activeTab = null; state.openPolicies = {};
    render();
  }));
  const back = document.getElementById('back');
  if (back) back.addEventListener('click', () => { state.view = 'search'; state.submitted = null; render(); });
  document.querySelectorAll('[data-tab]').forEach(el => el.addEventListener('click', () => { state.activeTab = el.dataset.tab; render(); }));
  document.querySelectorAll('[data-policy]').forEach(el => el.addEventListener('click', () => {
    state.openPolicies[el.dataset.policy] = !state.openPolicies[el.dataset.policy]; render();
  }));
}

function loadLocalData() {
  try {

    clients.forEach(c => { if (!CLIENTS.find(x=>x.id===c.id)) CLIENTS.push(c); });
    Object.entries(policies).forEach(([id,p]) => {
      const nid=parseInt(id);
      if (POLICIES[nid]) { (p.life||[]).forEach(l=>POLICIES[nid].life.push(l)); (p.health||[]).forEach(h=>{ if(!POLICIES[nid].health.includes(h)) POLICIES[nid].health.push(h); }); }
      else POLICIES[nid]={life:p.life||[],health:p.health||[]};
    });
  } catch(e) {}
}
function saveLocal() {
  const extra=CLIENTS.filter(c=>c.id>=100);
  const expol={};
  extra.forEach(c=>{ if(POLICIES[c.id]) expol[c.id]=POLICIES[c.id]; });
  localStorage.setItem('ek_clients',JSON.stringify(extra));
  localStorage.setItem('ek_policies',JSON.stringify(expol));
  ghSave({clients:extra,policies:expol}).then(ok=>{
    admin.ghSaveStatus=ok?'ok':(getGHConf().repo?'err':'none');
    if(state.view==='admin') render();
  });
}

// ===== GITHUB =====
function getGHConf(){ return {repo:localStorage.getItem('ek_gh_repo')||'',pat:localStorage.getItem('ek_gh_pat')||'',sha:localStorage.getItem('ek_gh_sha')||''}; }

async function ghFetch(){
  const {repo,pat}=getGHConf(); if(!repo||!pat) return null;
  try {
    const r=await fetch(`https://api.github.com/repos/${repo}/contents/data.json`,{headers:{'Authorization':`token ${pat}`,'Accept':'application/vnd.github.v3+json'}});
    if(r.status===404) return {clients:[],policies:{}};
    if(!r.ok) return null;
    const d=await r.json();
    localStorage.setItem('ek_gh_sha',d.sha);
    return JSON.parse(atob(d.content.replace(/\n/g,'')));
  } catch(e){ return null; }
}

async function ghSave(data){
  const {repo,pat,sha}=getGHConf(); if(!repo||!pat) return false;
  try {
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
    const body={message:'E-kartica: posodobitev',content,...(sha?{sha}:{})};
    const r=await fetch(`https://api.github.com/repos/${repo}/contents/data.json`,{method:'PUT',headers:{'Authorization':`token ${pat}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!r.ok) return false;
    const res=await r.json(); localStorage.setItem('ek_gh_sha',res.content.sha); return true;
  } catch(e){ return false; }
}

async function ghTestConn(){
  const repo=av('adm-gh-repo'),pat=av('adm-gh-pat'); if(!repo||!pat) return false;
  try {
    const r=await fetch(`https://api.github.com/repos/${repo}`,{headers:{'Authorization':`token ${pat}`}});
    return r.ok;
  } catch(e){ return false; }

async function initApp(){
  loadLocalData();
  render(); // prikaži takoj
  const ghData=await ghFetch(); // GitHub v ozadju
  if(ghData){
    let changed=false;
    (ghData.clients||[]).forEach(c=>{ if(!CLIENTS.find(x=>x.id===c.id)){ CLIENTS.push(c); changed=true; } });
    Object.entries(ghData.policies||{}).forEach(([id,p])=>{
      const nid=parseInt(id);
      if(POLICIES[nid]){ (p.life||[]).forEach(l=>{ if(!POLICIES[nid].life.find(x=>x.id===l.id)){ POLICIES[nid].life.push(l); changed=true; } }); (p.health||[]).forEach(h=>{ if(!POLICIES[nid].health.includes(h)){ POLICIES[nid].health.push(h); changed=true; } }); }
      else{ POLICIES[nid]={life:p.life||[],health:p.health||[]}; changed=true; }
    });
    if(changed) render(); // osveži samo če so novi podatki
  }
}

    </div>
    ${admin.err?`<div style="font-size:12px;color:#c0392b;margin-bottom:12px">${admin.err}</div>`:''}
    <button id="adm-save-health" style="padding:9px 24px;background:var(--green);color:#fff;border:none;border-radius:var(--radius-md);font-size:14px;font-weight:500;cursor:pointer">Shrani zavarovanja</button>
  </div>`; }

function polToForm(pol){
  const ptMap={'Fleks za starejše':'fleksS','Fleks':'fleks','Mešano življenjsko zavarovanje':'mesano'};
  const pt=ptMap[pol.name]||(pol.type==='fleks'?'fleks':'life');
  const f={pt};
  if(pol.period.startsWith('od ')) f.periodStart=pol.period.replace('od ','');
  else if(pol.period.includes(' – ')){ const p=pol.period.split(' – '); f.periodStart=p[0]; f.periodEnd=p[1]; }
  (pol.base||[]).forEach(({n,v})=>{
    if(n.includes('ZZV')) f.zzv=v; else if(n.includes('Sredstva')) f.sredstva=v;
    else if(n.includes('Mesečna premija')) f.premija=v; else if(n.includes('Skladi')||n.includes('Strategija')) f.skladi=v;
    else if(n.includes('ZV za smrt')) f.zvSmrt=v; else if(n.includes('doživetje')) f.zvDoziv=v;
  });
  if(pol.nezgodno?.length){ f.nezgodnoOpen=true; pol.nezgodno.forEach(({n,v})=>{
    if(n.includes('Nezgodna smrt')){f.nezSmrt=true;f.nezSmrtV=v;}
    else if(n.includes('Invalidnost')&&!n.includes('renta')&&!n.includes('Renta')){f.nezInv=true;f.nezInvV=v;}
    else if(n.includes('Dnevno')){f.nezDnevno=true;f.nezDnevnoV=v;}
    else if(n.includes('Bolnišnični')){f.nezBolnis=true;f.nezBolnisV=v;}
    else if(n.includes('30%')){f.nezRenta30=true;f.nezRenta30V=v;}
    else if(n.includes('50%')){f.nezRenta50=true;f.nezRenta50V=v;}
    else if(n.includes('Zlomi')){f.nezZlomi=true;f.nezZlomiV=v;}
  }); }
  if(pol.nezgodnoOtroci?.length){ f.otrociOpen=true; const m=pol.nezgodnoOtroci[0].n.match(/Kombinacija D \((.+?), (.+?)\)/); if(m){f.otrokIme=m[1];f.otrokDob=m[2];} }
  if(pol.hudeBolezni?.length){ f.hudeOpen=true; f.hudeZV=pol.hudeBolezni[0].v; }
  if(pol.delovnaNezmoznost?.length){ f.delovnaOpen=true; f.delovnaRenta=pol.delovnaNezmoznost[0].v; }
  return f;
}

function buildLifePol() {
  const f=admin.form; const isFleks=f.pt==='fleks'||f.pt==='fleksS';
  const nameMap={life:'Zavarovanje življenja',mesano:'Mešano življenjsko zavarovanje',fleks:'Fleks',fleksS:'Fleks za starejše'};
  const typeMap={life:'life',mesano:'life',fleks:'fleks',fleksS:'fleks'};
  const s=av('adm-period-start'),e=av('adm-period-end');
  const period=isFleks?(s?`od ${s}`:'—'):(s&&e?`${s} – ${e}`:s||'—');
  const base=[];
  if(isFleks){ if(av('adm-zzv')) base.push({n:'ZZV (zagotovljena ZV za smrt)',v:av('adm-zzv')}); if(av('adm-sredstva')) base.push({n:'Sredstva na računu',v:av('adm-sredstva')}); if(av('adm-premija')) base.push({n:'Mesečna premija',v:av('adm-premija')}); if(av('adm-skladi')) base.push({n:'Skladi / Strategija',v:av('adm-skladi')}); }
  else { if(av('adm-zv-smrt')) base.push({n:'ZV za smrt',v:av('adm-zv-smrt')}); if(f.pt==='mesano'&&av('adm-zv-doziv')) base.push({n:'ZV za doživetje',v:av('adm-zv-doziv')}); }
  let nezgodno=null; if(f.nezgodnoOpen){ const r=[]; if(ac('adm-nez-smrt')&&av('adm-nez-smrt-v')) r.push({n:'Nezgodna smrt',v:av('adm-nez-smrt-v')}); if(ac('adm-nez-inv')&&av('adm-nez-inv-v')) r.push({n:'Invalidnost',v:av('adm-nez-inv-v')}); if(ac('adm-nez-dnevno')&&av('adm-nez-dnevno-v')) r.push({n:'Dnevno nadomestilo',v:av('adm-nez-dnevno-v')}); if(ac('adm-nez-bolnis')&&av('adm-nez-bolnis-v')) r.push({n:'Bolnišnični dan',v:av('adm-nez-bolnis-v')}); if(ac('adm-nez-renta30')&&av('adm-nez-renta30-v')) r.push({n:'Invalidnostna renta 30%',v:av('adm-nez-renta30-v')}); if(ac('adm-nez-renta50')&&av('adm-nez-renta50-v')) r.push({n:'Invalidnostna renta 50%',v:av('adm-nez-renta50-v')}); if(ac('adm-nez-zlomi')&&av('adm-nez-zlomi-v')) r.push({n:'Zlomi, izpahi, opekline',v:av('adm-nez-zlomi-v')}); if(r.length) nezgodno=r; }
  let nezgodnoOtroci=null; if(f.otrociOpen&&av('adm-otrok-ime')) nezgodnoOtroci=[{n:`Kombinacija D (${av('adm-otrok-ime')}, ${av('adm-otrok-dob')})`,v:''}];
  let hudeBolezni=null; if(f.hudeOpen&&av('adm-hude-zv')) hudeBolezni=[{n:'Zavarovalna vsota',v:av('adm-hude-zv')}];
  let delovnaNezmoznost=null; if(f.delovnaOpen&&av('adm-delovna-renta')) delovnaNezmoznost=[{n:'Začasna delovna nezmožnost (mesečna renta)',v:av('adm-delovna-renta')}];
  return {id:`adm_${Date.now()}`,type:typeMap[f.pt]||'life',name:nameMap[f.pt]||'Zavarovanje življenja',period,base,nezgodno,nezgodnoOtroci,hudeBolezni,delovnaNezmoznost,_adm:true};
}

function attachAdminLoginEvents() {
  ai('adm-login-btn')?.addEventListener('click',()=>{
    const u=av('adm-user'),p=av('adm-pass');
    if(u===ADMIN_CREDENTIALS.user&&p===ADMIN_CREDENTIALS.pass){ admin.loggedIn=true; admin.showLogin=false; admin.err=''; state.view='admin'; render(); }
    else { admin.err='Napačno uporabniško ime ali geslo.'; ai('adm-overlay').outerHTML=renderAdminLoginModal(); attachAdminLoginEvents(); }
  });
  ai('adm-cancel-btn')?.addEventListener('click',()=>{ admin.showLogin=false; render(); });
  ai('adm-user')?.addEventListener('keydown',e=>e.key==='Enter'&&ai('adm-pass')?.focus());
  ai('adm-pass')?.addEventListener('keydown',e=>e.key==='Enter'&&ai('adm-login-btn')?.click());
}

function attachAdminEvents() {
  ai('adm-gh-btn')?.addEventListener('click',()=>{ admin.view='ghConfig'; admin.ghTestOk=undefined; admin.err=''; render(); });
  ai('adm-gh-test')?.addEventListener('click',async()=>{ ai('adm-gh-test').textContent='Testiram...'; const ok=await ghTestConn(); admin.ghTestOk=ok; render(); });
  ai('adm-gh-save-conf')?.addEventListener('click',()=>{ const repo=av('adm-gh-repo'),pat=av('adm-gh-pat'); if(!repo||!pat){admin.err='Vnesite repozitorij in PAT.';render();return;} localStorage.setItem('ek_gh_repo',repo); localStorage.setItem('ek_gh_pat',pat); localStorage.removeItem('ek_gh_sha'); admin.view='home'; admin.err=''; admin.ghTestOk=undefined; render(); });
  ai('adm-logout')?.addEventListener('click',()=>{ admin.loggedIn=false; state.view='search'; render(); });
  ai('adm-back')?.addEventListener('click',()=>{ syncForm(); const fromDetail=['addClient','clientDetail','ghConfig']; admin.view=fromDetail.includes(admin.view)?'home':'clientDetail'; admin.err=''; admin.ghTestOk=undefined; admin.editPolId=null; if(admin.view==='home') admin.form={}; render(); });
  ai('adm-add-client')?.addEventListener('click',()=>{ admin.view='addClient'; admin.form={}; admin.err=''; render(); });
  ai('adm-save-client')?.addEventListener('click',()=>{
    const name=av('adm-new-name'),dob=av('adm-new-dob');
    if(!name||!dob){ admin.err='Vnesite ime in datum rojstva.'; render(); return; }
    const id=getNextId(); CLIENTS.push({id,name:name.toUpperCase().trim(),dob}); POLICIES[id]={life:[],health:[]};
    saveLocal(); admin.view='clientDetail'; admin.clientId=id; admin.form={}; admin.err=''; render();
  });
  document.querySelectorAll('.adm-sel').forEach(b=>b.addEventListener('click',()=>{ admin.clientId=parseInt(b.dataset.id); admin.view='clientDetail'; admin.form={}; render(); }));
  document.querySelectorAll('.adm-del-c').forEach(b=>b.addEventListener('click',()=>{
    if(!confirm('Izbrisati stranko?')) return;
    const id=parseInt(b.dataset.id); CLIENTS.splice(CLIENTS.findIndex(c=>c.id===id),1); delete POLICIES[id]; saveLocal(); render();
  }));
  ai('adm-del-this')?.addEventListener('click',()=>{ if(!confirm('Izbrisati stranko?')) return; CLIENTS.splice(CLIENTS.findIndex(c=>c.id===admin.clientId),1); delete POLICIES[admin.clientId]; saveLocal(); admin.view='home'; render(); });
  ai('adm-add-life')?.addEventListener('click',()=>{ admin.view='addLifePolicy'; admin.form={pt:'life'}; admin.err=''; render(); });
  ai('adm-add-health')?.addEventListener('click',()=>{ admin.view='addHealthPolicy'; admin.form={hs:[]}; admin.err=''; render(); });
  document.querySelectorAll('.adm-type-btn').forEach(b=>b.addEventListener('click',()=>{ syncForm(); admin.form.pt=b.dataset.t; render(); }));
  ['nezgodno','otroci','hude','delovna'].forEach(sec=>ai(`adm-tog-${sec}`)?.addEventListener('click',()=>{ syncForm(); admin.form[sec+'Open']=!admin.form[sec+'Open']; render(); }));
  document.querySelectorAll('[id^=adm-nez-]:not([id$=-v])').forEach(cb=>cb.addEventListener('change',()=>{ const el=ai(cb.id+'-v'); if(el) el.disabled=!cb.checked; }));
  ai('adm-save-life')?.addEventListener('click',()=>{
    syncForm(); const pol=buildLifePol();
    if(!POLICIES[admin.clientId]) POLICIES[admin.clientId]={life:[],health:[]};
    if(admin.editPolId){
      // Edit mode: replace existing policy
      const idx=POLICIES[admin.clientId].life.findIndex(p=>p.id===admin.editPolId);
      pol.id=admin.editPolId; pol._adm=POLICIES[admin.clientId].life[idx]?._adm||false;
      if(idx>-1) POLICIES[admin.clientId].life[idx]=pol;
      admin.editPolId=null;
    } else {
      POLICIES[admin.clientId].life.push(pol);
    }
    saveLocal(); admin.view='clientDetail'; admin.form={}; admin.err=''; render();
  });
  document.querySelectorAll('.adm-hchk').forEach(cb=>cb.addEventListener('change',()=>{
    if(!admin.form.hs) admin.form.hs=[];
    const opt=cb.dataset.opt;
    if(cb.checked){ if(!admin.form.hs.includes(opt)) admin.form.hs.push(opt); } else admin.form.hs=admin.form.hs.filter(x=>x!==opt);
    render();
  }));
  ai('adm-save-health')?.addEventListener('click',()=>{
    if(!admin.form.hs?.length){ admin.err='Izberite vsaj eno zavarovanje.'; render(); return; }
    if(!POLICIES[admin.clientId]) POLICIES[admin.clientId]={life:[],health:[]};
    const opZV=av('adm-op-zv');
    admin.form.hs.forEach(h=>{ const lbl=h==='Operacije'?`Operacije (ZV ${opZV||'30.000'})`:h; if(!POLICIES[admin.clientId].health.includes(lbl)) POLICIES[admin.clientId].health.push(lbl); });
    saveLocal(); admin.view='clientDetail'; admin.form={}; admin.err=''; render();
  });
  document.querySelectorAll('.adm-edit-pol').forEach(b=>b.addEventListener('click',()=>{
    const pid=b.dataset.pid;
    const pol=POLICIES[admin.clientId].life.find(p=>p.id===pid);
    if(!pol) return;
    admin.editPolId=pid; admin.form=polToForm(pol); admin.view='addLifePolicy'; admin.err=''; render();
  }));
  document.querySelectorAll('.adm-del-pol').forEach(b=>b.addEventListener('click',()=>{ POLICIES[admin.clientId][b.dataset.type]=POLICIES[admin.clientId][b.dataset.type].filter(p=>p.id!==b.dataset.pid); saveLocal(); render(); }));
}
// ===================== END ADMIN =====================

loadLocalData();
initApp();
</script>

  navigator.serviceWorker.register('./sw.js').catch(()=>{});
