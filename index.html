    --text-tertiary: #9e9d98;

    --border-hover: rgba(0,0,0,0.22);
    --radius-md: 8px;
    --radius-lg: 12px;
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --blue-dark: #0C447C;
    --orange: #D85A30;
    --green: #1D9E75;
    --green-light: #EAF3DE;
    --green-text: #3B6D11;
  }

    :root {
      --bg: #1c1c1a;
      --bg-secondary: #252523;
      --bg-tertiary: #2e2e2b;
      --text: #f0efe9;
      --text-secondary: #9e9d98;
      --text-tertiary: #6b6a65;
      --border: rgba(255,255,255,0.1);

      --green-light: #0e2a16;
      --green-text: #6fcf97;
    }

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-tertiary); color: var(--text); min-height: 100vh; }
  .page { max-width: 860px; margin: 0 auto; padding: 2rem 1.25rem; }

  .page-title { font-size: 16px; font-weight: 500; }
  .page-sub { font-size: 12px; color: var(--text-tertiary); margin-top: 1px; }

  .search-row { display: flex; gap: 8px; margin-bottom: 0.75rem; }
  .search-input { flex: 1; padding: 10px 14px; font-size: 15px; border: 1px solid var(--border); border-radius: var(--radius-md); background: var(--bg); color: var(--text); outline: none; }
  .search-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(24,95,165,0.12); }
  .search-btn { padding: 10px 20px; background: var(--blue); color: #fff; border: none; border-radius: var(--radius-md); font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .search-btn:hover { background: var(--blue-dark); }
  .search-hint { font-size: 12px; color: var(--text-tertiary); margin-bottom: 1.25rem; line-height: 1.5; }

  .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 1.25rem; }
  .tab { padding: 8px 18px; font-size: 13px; color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .tab.active { color: var(--text); border-bottom-color: var(--blue); font-weight: 500; }
  .tab .badge { display: inline-flex; align-items: center; justify-content: center; background: var(--blue); color: #fff; border-radius: 10px; font-size: 11px; padding: 1px 6px; margin-left: 5px; }

  .results-table { width: 100%; border-collapse: collapse; background: var(--bg); border-radius: var(--radius-lg); overflow: hidden; border: 0.5px solid var(--border); }
  .results-table th { font-size: 12px; color: var(--text-secondary); font-weight: 400; text-align: left; padding: 8px 12px; background: var(--bg-secondary); border-bottom: 0.5px solid var(--border); }
  .results-table td { padding: 11px 12px; font-size: 13px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
  .results-table tr:last-child td { border-bottom: none; }
  .client-link { color: var(--blue); font-weight: 500; cursor: pointer; text-decoration: none; }
  .client-link:hover { text-decoration: underline; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--bg-secondary); border: 0.5px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 15px; }
  .opozoril { font-size: 12px; color: var(--text-tertiary); }
  .empty-state { text-align: center; padding: 3rem; color: var(--text-secondary); font-size: 14px; background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); }

  .client-header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
  .back-btn { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--text-secondary); cursor: pointer; padding: 7px 12px; border-radius: var(--radius-md); background: var(--bg); border: 0.5px solid var(--border); white-space: nowrap; }
  .back-btn:hover { background: var(--bg-secondary); }
  .client-name { font-size: 19px; font-weight: 500; }
  .client-meta { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

  .ins-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 1.25rem; }
  .ins-card { background: var(--bg); padding: 1.15rem 1.25rem; cursor: pointer; transition: background 0.12s; }
  .ins-card:hover { background: var(--bg-secondary); }
  .ins-card.active { background: var(--blue-light); }
  .ins-card.inactive { opacity: 0.38; pointer-events: none; }
  .ins-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .ins-icon { width: 40px; height: 40px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 19px; color: #fff; flex-shrink: 0; }
  .ins-icon.life { background: var(--orange); }
  .ins-icon.health { background: var(--green); }
  .ins-title { font-size: 13px; font-weight: 500; color: var(--blue); line-height: 1.3; }
  .ins-count { font-size: 28px; font-weight: 500; }
  .ins-label { font-size: 12px; color: var(--text-secondary); }

  .health-list { display: flex; flex-direction: column; gap: 6px; }
  .health-simple { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); }
  .health-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .health-name { font-size: 13px; font-weight: 500; }
  .health-badge { margin-left: auto; font-size: 11px; padding: 3px 8px; border-radius: 10px; background: var(--green-light); color: var(--green-text); font-weight: 500; }

  .section-header { display: flex; align-items: center; gap: 10px; padding: 8px 0; margin-bottom: 10px; border-bottom: 0.5px solid var(--border); }
  .section-header-title { font-size: 15px; font-weight: 500; }

  .policy-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 8px; overflow: hidden; }
  .policy-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; cursor: pointer; gap: 8px; }
  .policy-header:hover { background: var(--bg-secondary); }
  .policy-left { display: flex; align-items: center; gap: 10px; }
  .policy-icon { width: 32px; height: 32px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 14px; color: #fff; flex-shrink: 0; }
  .policy-icon.life { background: var(--orange); }
  .policy-icon.fleks { background: var(--blue); }
  .policy-name { font-size: 13px; font-weight: 500; }
  .policy-period { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
  .policy-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .policy-status { font-size: 11px; padding: 2px 7px; border-radius: 10px; background: var(--green-light); color: var(--green-text); font-weight: 500; }
  .policy-type-tag { font-size: 11px; padding: 2px 7px; border-radius: 10px; background: var(--blue-light); color: var(--blue-dark); font-weight: 500; }
  .policy-chevron { font-size: 15px; color: var(--text-secondary); transition: transform 0.2s; }
  .policy-chevron.open { transform: rotate(180deg); }
  .policy-body { border-top: 0.5px solid var(--border); display: none; }
  .policy-body.open { display: block; }

  .pol-section { padding: 11px 14px; border-bottom: 0.5px solid var(--border); }
  .pol-section:last-child { border-bottom: none; }
  .pol-section-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-tertiary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .pol-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot-base { background: var(--orange); }
  .dot-nezgodno { background: #BA7517; }
  .dot-hude { background: #993556; }
  .dot-delovna { background: var(--blue); }
  .dot-otroci  { background: #1D9E75; }
  .cov-table { width: 100%; font-size: 13px; border-collapse: collapse; }
  .cov-table td { padding: 4px 0; }
  .cov-table td:first-child { color: var(--text-secondary); }
  .cov-table td:last-child { text-align: right; font-weight: 500; }
  .cov-table tr:not(:last-child) td { border-bottom: 0.5px solid var(--border); }

</head>

const SECTIONS = [
  { key:'base',              label:'Osnovno zavarovanje',               dotClass:'dot-base',     fleksLabel:'Fleks – osnova' },
  { key:'nezgodno',          label:'Dodatno nezgodno zavarovanje',        dotClass:'dot-nezgodno', fleksLabel:null },
  { key:'nezgodnoOtroci',    label:'Dodatno nezgodno zavarovanje otrok',  dotClass:'dot-otroci',   fleksLabel:null },
  { key:'hudeBolezni',       label:'Dodatno zavarovanje za hude bolezni',             dotClass:'dot-hude',     fleksLabel:null },
  { key:'delovnaNezmoznost', label:'Dodatno zavarovanje za začasno delovno nezmožnost', dotClass:'dot-delovna',  fleksLabel:null },
];

let state = { view:'search', query:'', submitted:null, client:null, activeTab:null, openPolicies:{} };

function calcAge(dob) {
  const [d, m, y] = dob.split('.').map(Number);
  const today = new Date();
  let age = today.getFullYear() - y;
  if (today.getMonth() + 1 < m || (today.getMonth() + 1 === m && today.getDate() < d)) age--;
  return age;
}

function doSearch() { state.submitted = state.query.trim(); render(); }

function render() {
  document.getElementById('root').innerHTML = state.view === 'search' ? renderSearch() : renderClient();
  attachEvents();
}

function renderSearch() {
  const q = (state.submitted || '').toLowerCase();
  const results = state.submitted === null ? [] : q.length === 0 ? CLIENTS : CLIENTS.filter(c => c.name.toLowerCase().includes(q) || c.dob.includes(q));
  return `
    <div class="search-row">
      <input class="search-input" id="search" type="text" placeholder="Vpišite ime ali datum rojstva…" value="${state.query}" autocomplete="off">
      <button class="search-btn" id="searchBtn"><i class="ti ti-search"></i> Išči</button>
    </div>
    <p class="search-hint">Iskalnik omogoča iskanje po imenu, priimku in datumu rojstva.</p>
    <div class="tabs">
      <div class="tab active">Stranke${state.submitted !== null && results.length ? `<span class="badge">${results.length}</span>` : ''}</div>
      <div class="tab">Police</div><div class="tab">Škode</div><div class="tab">Dokumenti</div>
    </div>
    ${state.submitted === null
      ? `<div class="empty-state"><i class="ti ti-search" style="font-size:32px;display:block;margin-bottom:10px;opacity:0.2"></i>Vnesite ime ali kliknite Išči za vse stranke</div>`
      : !results.length
        ? `<div class="empty-state">Ni rezultatov za „<strong>${state.submitted}</strong>"</div>`
        : `<table class="results-table"><thead><tr>
            <th></th><th></th><th>Naziv</th><th>Datum rojstva</th><th>Opozorila</th>
          </tr></thead><tbody>
          ${results.map(c=>`<tr>
            <td style="width:28px"><input type="checkbox"></td>
            <td style="width:32px"><div class="avatar"><i class="ti ti-user"></i></div></td>
            <td><a class="client-link" data-id="${c.id}">${c.name}</a></td>
            <td>${c.dob}</td>
            <td><span class="opozoril">ni opozoril</span></td>
          </tr>`).join('')}
          </tbody></table>`}`;
}

function renderClient() {
  const c = state.client;
  const p = POLICIES[c.id];
  const lifeN = p.life.length, healthN = p.health.length;

  const noPoliciesBlock = (p.external && p.external.length) ? `
    <div style="background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;margin-top:0.5rem;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
        <i class="ti ti-alert-triangle" style="color:#BA7517;font-size:18px"></i>
        <span style="font-size:13px;font-weight:500;color:var(--text)">Nima zavarovanj pri nas</span>
      </div>
      <div style="font-size:12px;color:var(--text-secondary);margin-bottom:10px;">Znana zavarovanja pri drugih ponudnikih:</div>
      ${p.external.map(e=>`<div style="display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:0.5px solid var(--border);">
        <span style="color:var(--text-secondary)">${e.n}</span>
        <span style="font-weight:500">${e.v}</span>
      </div>`).join('')}
    </div>` : `<div class="empty-state" style="margin-top:0.5rem">Nima zavarovanj pri nas.</div>`;

  return `
    <div class="client-header">
      <div class="back-btn" id="back"><i class="ti ti-arrow-left"></i> Nazaj</div>
      <div>
        <div class="client-name">${c.name}</div>
        <div class="client-meta">Datum rojstva: ${c.dob} · ${calcAge(c.dob)} let</div>
      </div>
    </div>
    ${c.noPolicies ? noPoliciesBlock : `
    <div class="ins-grid">
      <div class="ins-card ${state.activeTab==='life'?'active':''} ${!lifeN?'inactive':''}" data-tab="life">
        <div class="ins-card-header">
          <div class="ins-icon life"><i class="ti ti-friends"></i></div>
          <span class="ins-title">Življenjska zavarovanja</span>
        </div>
        <div class="ins-count">${lifeN}</div>
        <div class="ins-label">Aktivne police</div>
      </div>
      <div class="ins-card ${state.activeTab==='health'?'active':''} ${!healthN?'inactive':''}" data-tab="health">
        <div class="ins-card-header">
          <div class="ins-icon health"><i class="ti ti-activity"></i></div>
          <span class="ins-title">Zdravstvena zavarovanja</span>
        </div>
        <div class="ins-count">${healthN}</div>
        <div class="ins-label">Aktivne police</div>
      </div>
    </div>
    ${state.activeTab === 'life' ? renderLifePolicies(p.life)
    : state.activeTab === 'health' ? renderHealth(p.health)
    : '<div class="empty-state">Kliknite na kategorijo za pregled polic.</div>'}`}`;
}

function renderLifePolicies(list) {
  if (!list.length) return `<div class="empty-state">Ni polic v tej kategoriji.</div>`;
  return `<div>
    <div class="section-header">
      <div class="ins-icon life" style="width:26px;height:26px;font-size:13px"><i class="ti ti-friends"></i></div>
      <span class="section-header-title">Življenjska zavarovanja</span>
    </div>
    ${list.map(pol => {
      const open = state.openPolicies[pol.id];
      const isFleks = pol.type === 'fleks';
      const activeSections = SECTIONS.filter(s => pol[s.key] && pol[s.key].length);
      return `<div class="policy-card">
        <div class="policy-header" data-policy="${pol.id}">
          <div class="policy-left">
            <div class="policy-icon ${isFleks?'fleks':'life'}"><i class="ti ${isFleks?'ti-chart-line':'ti-friends'}"></i></div>
            <div>
              <div class="policy-name">${pol.name}</div>
              ${pol.period !== '—' ? `<div class="policy-period">${pol.period}</div>` : ''}
            </div>
          </div>
          <div class="policy-right">
            ${isFleks ? `<span class="policy-type-tag">Fleks</span>` : ''}
            <span class="policy-status">Aktivna</span>
            <i class="ti ti-chevron-down policy-chevron${open?' open':''}"></i>
          </div>
        </div>
        <div class="policy-body${open?' open':''}">
          ${activeSections.map(s => `
            <div class="pol-section">
              <div class="pol-section-label">
                <span class="pol-dot ${s.dotClass}"></span>
                ${isFleks && s.key==='base' ? s.fleksLabel : s.label}
              </div>
              <table class="cov-table">
                ${pol[s.key].map(cv=>`<tr><td>${cv.n}</td><td>${cv.v}</td></tr>`).join('')}
              </table>
            </div>`).join('')}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderHealth(list) {
  if (!list.length) return `<div class="empty-state">Ni zdravstvenih zavarovanj.</div>`;
  return `<div>
    <div class="section-header">
      <div class="ins-icon health" style="width:26px;height:26px;font-size:13px"><i class="ti ti-activity"></i></div>
      <span class="section-header-title">Zdravstvena zavarovanja</span>
    </div>
    <div class="health-list">
      ${list.map(name=>`
        <div class="health-simple">
          <div class="health-dot"></div>
          <span class="health-name">${name}</span>
          <span class="health-badge">Aktivna</span>
        </div>`).join('')}
    </div>
  </div>`;
}

function attachEvents() {
  const inp = document.getElementById('search');
  if (inp) {
    inp.addEventListener('input', e => state.query = e.target.value);
    inp.addEventListener('keydown', e => e.key === 'Enter' && doSearch());
    inp.focus();
    inp.setSelectionRange(inp.value.length, inp.value.length);
  }
  const btn = document.getElementById('searchBtn');
  if (btn) btn.addEventListener('click', doSearch);
  document.querySelectorAll('.client-link').forEach(a => a.addEventListener('click', e => {
    e.preventDefault();
    state.client = CLIENTS.find(c => c.id === parseInt(a.dataset.id));
    state.view = 'client'; state.activeTab = null; state.openPolicies = {};
    render();
  }));
  const back = document.getElementById('back');
  if (back) back.addEventListener('click', () => { state.view = 'search'; state.submitted = null; render(); });
  document.querySelectorAll('[data-tab]').forEach(el => el.addEventListener('click', () => { state.activeTab = el.dataset.tab; render(); }));
  document.querySelectorAll('[data-policy]').forEach(el => el.addEventListener('click', () => {
    state.openPolicies[el.dataset.policy] = !state.openPolicies[el.dataset.policy]; render();
  }));
}

render();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js');
  });
}
